<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proconvoi17</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      margin: 0;
      padding: 0;
      color: #1f2937;
    }
    .container {
      max-width: 700px;
      margin: 40px auto;
      background: #fff;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
      color: #111827;
    }
    p {
      color: #4b5563;
    }
    label {
      display: block;
      margin-top: 16px;
      margin-bottom: 6px;
      font-weight: 600;
    }
    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      box-sizing: border-box;
    }
    button {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      background: #111827;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #1f2937;
    }
    .result {
      margin-top: 24px;
      padding: 16px;
      background: #f9fafb;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Proconvoi17</h1>
    <p>Calcul rapide de devis convoyage.</p>

    <label for="type">Type de véhicule</label>
    <select id="type">
      <option value="0.98">VL - 0,98 €/km</option>
      <option value="2.2">PL / SPL - 2,20 €/km</option>
    </select>

    <label for="km">Distance en kilomètres</label>
    <input type="number" id="km" placeholder="Ex: 150" />

    <button onclick="calculer()">Calculer le devis</button>

    <div class="result" id="resultat">Montant estimatif : 0,00 €</div>
  </div>

  <script>
    function calculer() {
      const km = parseFloat(document.getElementById('km').value) || 0;
      const tarif = parseFloat(document.getElementById('type').value) || 0;
      const base = km * tarif;
      const frais = base * 0.26;
      const total = base + frais;

      document.getElementById('resultat').innerText =
        "Montant estimatif : " + total.toFixed(2).replace('.', ',') + " €";
    }
  </script>
</body>
</html>
