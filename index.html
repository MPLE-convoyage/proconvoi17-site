<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Proconvoi17</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f7fb;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 600px;
      margin: 50px auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      background: black;
      color: white;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Proconvoi17</h1>
  <p>Calcul rapide de devis convoyage</p>

  <label>Type de véhicule</label>
  <select id="type">
    <option value="0.98">VL - 0,98 €/km</option>
    <option value="1.2">Utilitaire - 1,20 €/km</option>
  </select>

  <label>Distance (km)</label>
  <input id="km" type="number" placeholder="Ex: 150">

  <button onclick="calculer()">Calculer le devis</button>

  <div id="resultat" class="result">
    Montant estimatif : 0,00 €
  </div>
</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://znodbkoakkaucxikkway.supabase.co",
  "sb_publishable_Fl-F_uNkzXRUea86wbkabw_0WseZXJ1"
);

async function calculer() {
  const km = parseFloat(document.getElementById('km').value) || 0;
  const tarif = parseFloat(document.getElementById('type').value) || 0;

  const base = km * tarif;
  const frais = base * 0.26;
  const total = base + frais;

  document.getElementById('resultat').innerText =
    "Montant estimatif : " + total.toFixed(2).replace('.', ',') + " €";

  // 🔥 ENREGISTRE DANS SUPABASE
  const { error } = await supabaseClient
    .from("invoices")
    .insert([
      {
        client_email: "test@test.com",
        base_amount: base,
        fees_amount: frais,
        total_amount: total
      }
    ]);

  if (error) {
    console.error("❌ Erreur:", error);
  } else {
    console.log("✅ Sauvegardé !");
  }
}
</script>

</body>
</html>
