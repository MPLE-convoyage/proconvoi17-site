<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Proconvoi17</title>

<style>
body { font-family: Arial; background:#f4f7fb; padding:20px; }
.container { background:white; padding:20px; border-radius:10px; max-width:600px; margin:auto; }
input, select, button { width:100%; padding:10px; margin-top:10px; }
button { background:black; color:white; cursor:pointer; }
.result { margin-top:20px; font-weight:bold; }
</style>
</head>

<body>

<div class="container">
<h2>🚛 Proconvoi17</h2>

<input id="clientName" placeholder="Nom client">
<input id="clientEmail" placeholder="Email client">

<select id="type">
<option value="0.98">VL - 0,98€/km</option>
<option value="2.2">PL/SPL - 2,20€/km</option>
</select>

<input id="km" type="number" placeholder="Distance km">

<button onclick="calculer()">Calculer</button>
<button onclick="envoyerFacture()">Envoyer facture</button>

<div id="resultat" class="result"></div>
<div id="status"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://znodbkoakkaucxikkway.supabase.co",
  "sb_publishable_Fl-F_uNkzXRUea86wbkabw_0WseZXJ1"
);

const EMAIL_ENDPOINT = "https://znodbkoakkaucxikkway.supabase.co/functions/v1/send-invoice-email";

let derniereFacture = null;

function euro(v){ return Number(v).toFixed(2).replace(".", ",")+" €"; }

async function calculer(){
  const name = document.getElementById("clientName").value;
  const email = document.getElementById("clientEmail").value;
  const km = parseFloat(document.getElementById("km").value)||0;
  const tarif = parseFloat(document.getElementById("type").value)||0;

  const base = km*tarif;
  const frais = base*0.26;
  const total = base+frais;

  document.getElementById("resultat").innerText="Total : "+euro(total);

  const { data } = await supabaseClient
    .from("invoices")
    .insert([{
      client_name:name,
      client_email:email,
      base_amount:base,
      fees_amount:frais,
      total_amount:total,
      invoice_number:"FAC-"+Date.now()
    }])
    .select()
    .single();

  derniereFacture=data;
}

async function envoyerFacture(){
  if(!derniereFacture){
    alert("Fais un calcul avant");
    return;
  }

  const response = await fetch(EMAIL_ENDPOINT,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "apikey":"sb_publishable_Fl-F_uNkzXRUea86wbkabw_0WseZXJ1",
      "Authorization":"Bearer sb_publishable_Fl-F_uNkzXRUea86wbkabw_0WseZXJ1"
    },
    body:JSON.stringify({
      to:derniereFacture.client_email,
      subject:"Facture",
      text:"Facture "+derniereFacture.total_amount
    })
  });

  if(response.ok){
    document.getElementById("status").innerText="✅ Email envoyé";
  }else{
    document.getElementById("status").innerText="❌ Erreur email";
  }
}
</script>

</body>
</html>
