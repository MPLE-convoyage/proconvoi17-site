<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Proconvoi17</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; background:#eef1f5; margin:0; }
header { background:#0b1f3a; color:white; text-align:center; padding:30px; }
section { background:white; margin:20px auto; padding:20px; border-radius:12px; max-width:900px; }
input, select, textarea, button { width:100%; padding:10px; margin-top:5px; margin-bottom:10px; }
button { background:#0b1f3a; color:white; border:none; cursor:pointer; }
.status { background:#f4f4f4; padding:15px; border-radius:10px; }
</style>

</head>

<body>

<header>
<h1>Proconvoi17</h1>
<p>Convoyage VL / PL / SPL – Conducteur indépendant</p>
</header>

<section>
<h2>Demande de devis</h2>

<label>Nom</label>
<input type="text" id="nom">

<label>Email</label>
<input type="email" id="email">

<label>Téléphone</label>
<input type="text" id="telephone">

<label>Type de prestation</label>
<select id="prestation">
<option value="convoyage">Convoyage</option>
<option value="conducteur">Conducteur PL / SPL</option>
</select>

<label id="vehiculeLabel">Type de véhicule</label>
<select id="vehicule">
<option value="vl">VL - 0.98€/km</option>
<option value="pl">PL/SPL - 2.20€/km</option>
</select>

<label id="distanceLabel">Distance</label>
<input type="number" id="distance" value="0">

<label id="joursLabel" style="display:none;">Jours</label>
<input type="number" id="jours" value="1" style="display:none;">

<label id="decouchesLabel" style="display:none;">Découchés</label>
<input type="number" id="decouches" value="0" style="display:none;">

<label>Date souhaitée</label>
<input type="date" id="date">
<p id="etatDate" style="color:green;font-weight:bold;"></p>

<label>Infos</label>
<textarea id="infos"></textarea>

<button onclick="calculer()">Calculer et envoyer</button>

<div class="status">
<p>Montant : <span id="montant">0</span> €</p>
<p>Numéro : <span id="numero">-</span></p>
<p>Email : <span id="emailStatus">-</span></p>
</div>

</section>

<script>

const prestation = document.getElementById("prestation");

prestation.addEventListener("change", () => {
  if (prestation.value === "conducteur") {
    document.getElementById("vehicule").style.display = "none";
    document.getElementById("vehiculeLabel").style.display = "none";
    document.getElementById("distance").style.display = "none";
    document.getElementById("distanceLabel").style.display = "none";

    document.getElementById("jours").style.display = "block";
    document.getElementById("joursLabel").style.display = "block";
    document.getElementById("decouches").style.display = "block";
    document.getElementById("decouchesLabel").style.display = "block";
  } else {
    document.getElementById("vehicule").style.display = "block";
    document.getElementById("vehiculeLabel").style.display = "block";
    document.getElementById("distance").style.display = "block";
    document.getElementById("distanceLabel").style.display = "block";

    document.getElementById("jours").style.display = "none";
    document.getElementById("joursLabel").style.display = "none";
    document.getElementById("decouches").style.display = "none";
    document.getElementById("decouchesLabel").style.display = "none";
  }
});

function verifierDate() {
  const date = document.getElementById("date").value;

  if (!date) return true;

  document.getElementById("etatDate").innerText = "✅ Date à confirmer";
  return true;
}

function genererNumero() {
  const d = new Date();
  return "FAC-" + d.getFullYear() + (d.getMonth()+1) + d.getDate() + "-" + d.getHours() + d.getMinutes();
}

function calculer() {

  verifierDate();

  let montant = 0;

  if (prestation.value === "convoyage") {
    let km = parseFloat(document.getElementById("distance").value) || 0;
    let type = document.getElementById("vehicule").value;

    let tarif = type === "vl" ? 0.98 : 2.20;

    montant = km * tarif;
    montant += montant * 0.26;

    if (montant < 90) montant = 90;
  } else {
    let jours = parseFloat(document.getElementById("jours").value) || 0;
    let decouches = parseFloat(document.getElementById("decouches").value) || 0;

    montant = (jours * 320) + (decouches * 90);
  }

  const numero = genererNumero();

  document.getElementById("montant").innerText = montant.toFixed(2);
  document.getElementById("numero").innerText = numero;

  const data = {
    nom: document.getElementById("nom").value,
    email: document.getElementById("email").value,
    telephone: document.getElementById("telephone").value,
    prestation: prestation.value,
    vehicule: document.getElementById("vehicule").value,
    distance: document.getElementById("distance").value,
    jours: document.getElementById("jours").value,
    decouches: document.getElementById("decouches").value,
    dateSouhaitee: document.getElementById("date").value,
    infos: document.getElementById("infos").value,
    montant: montant.toFixed(2),
    numeroFacture: numero
  };

  fetch("/api/email/send-devis", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(data)
  })
  .then(() => {
    document.getElementById("emailStatus").innerText = "Envoyé";
  })
  .catch(() => {
    document.getElementById("emailStatus").innerText = "Erreur";
  });

}

</script>

</body>
</html>
