<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Admin Planning - Proconvoi17</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f7fb;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
      max-width: 900px;
      margin: 30px auto;
    }

    .day {
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      font-weight: bold;
    }

    .available {
      background: #dcfce7;
      color: #166534;
    }

    .unavailable {
      background: #fee2e2;
      color: #991b1b;
    }
  </style>
</head>

<body>

<h1>📅 Planning Proconvoi17</h1>
<p style="text-align:center;">Clique sur une date pour la bloquer / débloquer</p>

<div id="calendar" class="calendar"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://znodbkoakkaucxikkway.supabase.co",
  "sb_publishable_Fl-F_uNkzXRUea86wbkabw_0WseZXJ1"
);

let datesIndispo = [];

async function loadDates() {
  const { data } = await supabaseClient
    .from("unavailable_dates")
    .select("date");

  datesIndispo = data.map(d => d.date);
}

function formatDate(d) {
  return d.toISOString().split("T")[0];
}

function afficherCalendrier() {
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  for (let i = 0; i < 30; i++) {
    const d = new Date();
    d.setDate(d.getDate() + i);

    const iso = formatDate(d);
    const isOff = datesIndispo.includes(iso);

    const div = document.createElement("div");
    div.className = "day " + (isOff ? "unavailable" : "available");

    div.innerHTML = `
      ${d.toLocaleDateString("fr-FR")}
      <br>
      ${isOff ? "❌ Indispo" : "✅ Dispo"}
    `;

    div.onclick = () => toggleDate(iso);

    cal.appendChild(div);
  }
}

async function toggleDate(date) {

  if (datesIndispo.includes(date)) {
    await supabaseClient
      .from("unavailable_dates")
      .delete()
      .eq("date", date);
  } else {
    await supabaseClient
      .from("unavailable_dates")
      .insert([{ date }]);
  }

  await loadDates();
  afficherCalendrier();
}

async function init() {
  await loadDates();
  afficherCalendrier();
}

init();
</script>

</body>
</html>
