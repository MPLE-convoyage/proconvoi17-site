<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Proconvoi17</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef1f5;
      color: #142033;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      color: #0b1f3a;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button,
    a.button-link {
      border: none;
      background: #0b1f3a;
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      font-size: 14px;
    }

    button:hover,
    a.button-link:hover {
      opacity: 0.95;
    }

    .danger {
      background: #c62828;
    }

    .secondary {
      background: #52627b;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: white;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 6px 18px rgba(8, 25, 53, 0.08);
      border: 1px solid #d9dee7;
    }

    .stat-card h2 {
      margin: 0 0 8px;
      font-size: 14px;
      color: #5b6472;
    }

    .stat-card p {
      margin: 0;
      font-size: 24px;
      font-weight: bold;
      color: #0b1f3a;
    }

    .empty {
      background: white;
      border-radius: 16px;
      padding: 24px;
      border: 1px solid #d9dee7;
      text-align: center;
      color: #5b6472;
    }

    .list {
      display: grid;
      gap: 14px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 6px 18px rgba(8, 25, 53, 0.08);
      border: 1px solid #d9dee7;
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .numero {
      font-size: 18px;
      font-weight: bold;
      color: #0b1f3a;
      margin: 0;
    }

    .small {
      color: #5b6472;
      font-size: 13px;
      margin-top: 4px;
    }

    .badge {
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: bold;
      font-size: 13px;
      display: inline-block;
    }

    .paid {
      background: #e7f6ed;
      color: #198754;
    }

    .pending {
      background: #fff4e5;
      color: #b26a00;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 18px;
      margin-top: 10px;
    }

    .field {
      background: #f8fafc;
      border: 1px solid #e0e6ef;
      border-radius: 12px;
      padding: 10px 12px;
    }

    .field strong {
      display: block;
      font-size: 13px;
      color: #5b6472;
      margin-bottom: 4px;
    }

    .card-actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    @media (max-width: 900px) {
      .stats {
        grid-template-columns: 1fr 1fr;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 600px) {
      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div>
        <h1>Admin Proconvoi17</h1>
        <p class="small">Suivi simple des devis enregistrés dans le navigateur</p>
      </div>

      <div class="actions">
        <a href="/" class="button-link secondary">Retour au site</a>
        <button class="danger" onclick="viderHistorique()">Vider l’historique</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <h2>Nombre de devis</h2>
        <p id="statTotal">0</p>
      </div>

      <div class="stat-card">
        <h2>Payés</h2>
        <p id="statPayes">0</p>
      </div>

      <div class="stat-card">
        <h2>En attente</h2>
        <p id="statAttente">0</p>
      </div>

      <div class="stat-card">
        <h2>Montant total</h2>
        <p id="statMontant">0 €</p>
      </div>
    </div>

    <div id="content"></div>
  </div>

  <script>
    function chargerHistorique() {
      return JSON.parse(localStorage.getItem("proconvoi17_historique") || "[]");
    }

    function sauvegarderHistorique(historique) {
      localStorage.setItem("proconvoi17_historique", JSON.stringify(historique));
    }

    function formatDate(dateStr) {
      if (!dateStr) return "-";

      const d = new Date(dateStr);

      if (isNaN(d.getTime())) {
        return dateStr;
      }

      return d.toLocaleString("fr-FR");
    }

    function supprimerDevis(numeroFacture) {
      const historique = chargerHistorique();
      const nouveau = historique.filter(item => item.numeroFacture !== numeroFacture);
      sauvegarderHistorique(nouveau);
      afficherHistorique();
    }

    function viderHistorique() {
      const ok = confirm("Voulez-vous vraiment vider tout l’historique ?");
      if (!ok) return;

      localStorage.removeItem("proconvoi17_historique");
      afficherHistorique();
    }

    function calculerStats(historique) {
      const total = historique.length;
      const payes = historique.filter(item => item.statutPaiement === "payé").length;
      const attente = historique.filter(item => item.statutPaiement !== "payé").length;
      const montant = historique.reduce((sum, item) => sum + Number(item.montant || 0), 0);

      document.getElementById("statTotal").textContent = total;
      document.getElementById("statPayes").textContent = payes;
      document.getElementById("statAttente").textContent = attente;
      document.getElementById("statMontant").textContent = montant.toFixed(2) + " €";
    }

    function afficherHistorique() {
      const content = document.getElementById("content");
      const historique = chargerHistorique();

      calculerStats(historique);

      if (!historique.length) {
        content.innerHTML = `
          <div class="empty">
            <h2>Aucun devis enregistré</h2>
            <p>Les devis créés sur ce navigateur apparaîtront ici.</p>
          </div>
        `;
        return;
      }

      content.innerHTML = `
        <div class="list">
          ${historique.map(item => `
            <div class="card">
              <div class="card-top">
                <div>
                  <p class="numero">${item.numeroFacture || "-"}</p>
                  <p class="small">Créé le : ${formatDate(item.dateCreation)}</p>
                </div>

                <span class="badge ${item.statutPaiement === "payé" ? "paid" : "pending"}">
                  ${item.statutPaiement === "payé" ? "Payé" : "En attente"}
                </span>
              </div>

              <div class="grid">
                <div class="field">
                  <strong>Client</strong>
                  ${item.nom || "-"}
                </div>

                <div class="field">
                  <strong>Email</strong>
                  ${item.email || "-"}
                </div>

                <div class="field">
                  <strong>Téléphone</strong>
                  ${item.telephone || "-"}
                </div>

                <div class="field">
                  <strong>Société</strong>
                  ${item.societe || "-"}
                </div>

                <div class="field">
                  <strong>Prestation</strong>
                  ${item.prestation || "-"}
                </div>

                <div class="field">
                  <strong>Véhicule</strong>
                  ${item.vehicule || "-"}
                </div>

                <div class="field">
                  <strong>Distance</strong>
                  ${item.distance || "-"}
                </div>

                <div class="field">
                  <strong>Jours</strong>
                  ${item.jours || "-"}
                </div>

                <div class="field">
                  <strong>Découchés</strong>
                  ${item.decouches || "-"}
                </div>

                <div class="field">
                  <strong>Date souhaitée</strong>
                  ${item.dateSouhaitee || "-"}
                </div>

                <div class="field">
                  <strong>Montant</strong>
                  ${item.montant || "0.00"} €
                </div>

                <div class="field">
                  <strong>Informations</strong>
                  ${item.infos || "-"}
                </div>
              </div>

              <div class="card-actions">
                <button class="danger" onclick="supprimerDevis('${item.numeroFacture}')">
                  Supprimer
                </button>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    afficherHistorique();
  </script>
</body>
</html>
