<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Admin Proconvoi17</title>
<style>
body {
  font-family: Arial;
  background: #f4f7fb;
  padding: 20px;
}
.container {
  max-width: 600px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}
input, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}
button {
  background: black;
  color: white;
  cursor: pointer;
}
.result {
  margin-top: 20px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
  <h2>🔒 Admin Proconvoi17</h2>

  <input id="client" placeholder="Nom client">
  <input id="email" placeholder="Email client">
  <input id="prix" type="number" placeholder="Prix négocié €">

  <button onclick="generer()">Créer facture</button>
  <button onclick="envoyer()">Envoyer facture</button>

  <div class="result" id="result"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://znodbkoakkaucxikkway.supabase.co",
  "sb_publishable_Fl-F_uNkzXRUea86wbkabw_0WseZXJ1"
);

let facture = null;

function generer() {
  const client = document.getElementById("client").value;
  const email = document.getElementById("email").value;
  const prix = parseFloat(document.getElementById("prix").value);

  if (!client || !email || !prix) {
    alert("Remplis tout");
    return;
  }

  const invoice = "FAC-" + Date.now();

  facture = {
    client_name: client,
    client_email: email,
    total_amount: prix,
    invoice_number: invoice
  };

  document.getElementById("result").innerText =
    "Facture créée : " + invoice + " - " + prix + " €";
}

async function envoyer() {
  if (!facture) {
    alert("Crée une facture d'abord");
    return;
  }

  try {
    await fetch("https://znodbkoakkaucxikkway.supabase.co/functions/v1/send-invoice-email", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": "sb_publishable_Fl-F_uNkzXRUea86wbkabw_0WseZXJ1",
        "Authorization": "Bearer sb_publishable_Fl-F_uNkzXRUea86wbkabw_0WseZXJ1"
      },
      body: JSON.stringify({
        to: facture.client_email,
        subject: "Facture " + facture.invoice_number,
        text: "Montant : " + facture.total_amount + " €"
      })
    });

    document.getElementById("result").innerText =
      "✅ Facture envoyée à " + facture.client_email;

  } catch (err) {
    document.getElementById("result").innerText =
      "❌ Erreur envoi";
  }
}
</script>

</body>
</html>
