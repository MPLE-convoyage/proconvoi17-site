<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Proconvoi17</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef1f5;
      color: #142033;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    h1, h2 {
      margin: 0;
      color: #0b1f3a;
    }

    .small {
      color: #5b6472;
      font-size: 14px;
      margin-top: 6px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button,
    a.button-link {
      border: none;
      background: #0b1f3a;
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      font-size: 14px;
    }

    .danger { background: #c62828; }
    .secondary { background: #52627b; }

    .card {
      background: white;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 6px 18px rgba(8, 25, 53, 0.08);
      border: 1px solid #d9dee7;
      margin-bottom: 18px;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .calendar-nav {
      display: flex;
      gap: 8px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .day-name,
    .day-cell {
      text-align: center;
      padding: 12px 8px;
      border-radius: 12px;
    }

    .day-name {
      font-weight: bold;
      color: #5b6472;
      background: #f7f9fc;
      border: 1px solid #e2e8f0;
    }

    .day-cell {
      background: #fff;
      border: 1px solid #d9dee7;
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      font-weight: bold;
    }

    .day-cell.empty {
      background: transparent;
      border: none;
      cursor: default;
    }

    .day-cell.available {
      background: #f8fafc;
      color: #142033;
    }

    .day-cell.unavailable {
      background: #ffe5e5;
      color: #b00020;
      border-color: #f3b4b4;
    }

    .legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 14px;
      font-size: 14px;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot.available {
      background: #f8fafc;
      border: 1px solid #d9dee7;
    }

    .dot.unavailable {
      background: #ffe5e5;
      border: 1px solid #f3b4b4;
    }

    .dates-list {
      margin-top: 14px;
      padding-left: 18px;
    }

    .dates-list li {
      margin-bottom: 6px;
    }

    @media (max-width: 700px) {
      .calendar-grid {
        gap: 6px;
      }

      .day-name,
      .day-cell {
        padding: 10px 4px;
        font-size: 13px;
      }

      .day-cell {
        min-height: 54px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div>
        <h1>Admin Proconvoi17</h1>
        <p class="small">Clique sur une date pour la rendre indisponible ou disponible.</p>
      </div>

      <div class="actions">
        <a href="/" class="button-link secondary">Retour au site</a>
        <button class="danger" onclick="viderIndisponibilites()">Vider toutes les indisponibilités</button>
      </div>
    </div>

    <div class="card">
      <div class="calendar-header">
        <h2 id="monthTitle">Planning</h2>

        <div class="calendar-nav">
          <button type="button" onclick="changerMois(-1)">Mois précédent</button>
          <button type="button" onclick="changerMois(1)">Mois suivant</button>
        </div>
      </div>

      <div class="calendar-grid" id="calendarGrid"></div>

      <div class="legend">
        <span><i class="dot available"></i> Disponible</span>
        <span><i class="dot unavailable"></i> Indisponible</span>
      </div>
    </div>

    <div class="card">
      <h2>Dates indisponibles enregistrées</h2>
      <ul id="datesList" class="dates-list"></ul>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "proconvoi17_dates_indisponibles";
    let currentDate = new Date();

    function getDatesIndisponibles() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    }

    function saveDatesIndisponibles(dates) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(dates));
    }

    function formatDateLocal(year, month, day) {
      const m = String(month + 1).padStart(2, "0");
      const d = String(day).padStart(2, "0");
      return `${year}-${m}-${d}`;
    }

    function toggleDate(dateStr) {
      const dates = getDatesIndisponibles();
      const index = dates.indexOf(dateStr);

      if (index >= 0) {
        dates.splice(index, 1);
      } else {
        dates.push(dateStr);
      }

      dates.sort();
      saveDatesIndisponibles(dates);
      renderCalendar();
      renderDatesList();
    }

    function viderIndisponibilites() {
      if (!confirm("Supprimer toutes les indisponibilités ?")) return;
      localStorage.removeItem(STORAGE_KEY);
      renderCalendar();
      renderDatesList();
    }

    function changerMois(delta) {
      currentDate.setMonth(currentDate.getMonth() + delta);
      renderCalendar();
    }

    function renderDatesList() {
      const list = document.getElementById("datesList");
      const dates = getDatesIndisponibles();

      if (!dates.length) {
        list.innerHTML = "<li>Aucune date indisponible.</li>";
        return;
      }

      list.innerHTML = dates.map(date => `<li>${date}</li>`).join("");
    }

    function renderCalendar() {
      const grid = document.getElementById("calendarGrid");
      const title = document.getElementById("monthTitle");

      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      const monthName = currentDate.toLocaleDateString("fr-FR", {
        month: "long",
        year: "numeric"
      });

      title.textContent = `Planning - ${monthName.charAt(0).toUpperCase() + monthName.slice(1)}`;

      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const daysInMonth = lastDay.getDate();

      let startDay = firstDay.getDay();
      startDay = startDay === 0 ? 6 : startDay - 1; // lundi = 0

      const datesIndisponibles = getDatesIndisponibles();

      grid.innerHTML = "";

      const dayNames = ["Lun", "Mar", "Mer", "Jeu", "Ven", "Sam", "Dim"];
      dayNames.forEach(name => {
        const el = document.createElement("div");
        el.className = "day-name";
        el.textContent = name;
        grid.appendChild(el);
      });

      for (let i = 0; i < startDay; i++) {
        const empty = document.createElement("div");
        empty.className = "day-cell empty";
        grid.appendChild(empty);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = formatDateLocal(year, month, day);
        const isUnavailable = datesIndisponibles.includes(dateStr);

        const cell = document.createElement("div");
        cell.className = `day-cell ${isUnavailable ? "unavailable" : "available"}`;
        cell.textContent = day;
        cell.title = `${dateStr} - ${isUnavailable ? "Indisponible" : "Disponible"}`;
        cell.onclick = () => toggleDate(dateStr);

        grid.appendChild(cell);
      }
    }

    renderCalendar();
    renderDatesList();
  </script>
</body>
</html>
