<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Planning - Proconvoi17</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      margin: 0;
      padding: 20px;
      color: #1f2937;
    }

    .login-box,
    .admin-box {
      max-width: 1000px;
      margin: 30px auto;
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1, h2 {
      margin-top: 0;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      box-sizing: border-box;
      border: 1px solid #d1d5db;
    }

    button {
      background: #111827;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #1f2937;
    }

    .logout {
      background: #b91c1c;
      margin-top: 0;
      max-width: 220px;
    }

    .logout:hover {
      background: #991b1b;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
      margin-top: 20px;
    }

    .day {
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      font-weight: bold;
      line-height: 1.5;
      border: 1px solid transparent;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .day:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(0,0,0,0.08);
    }

    .available {
      background: #dcfce7;
      color: #166534;
      border-color: #86efac;
    }

    .unavailable {
      background: #fee2e2;
      color: #991b1b;
      border-color: #fca5a5;
    }

    .hidden {
      display: none;
    }

    .status {
      margin-top: 15px;
      padding: 12px;
      border-radius: 10px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      font-size: 14px;
      white-space: pre-line;
    }

    .small {
      font-size: 13px;
      color: #6b7280;
    }

    .client-line {
      font-size: 12px;
      margin-top: 6px;
      font-weight: normal;
      line-height: 1.4;
    }

    @media (max-width: 900px) {
      .calendar {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 600px) {
      .calendar {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>

  <div id="loginBox" class="login-box">
    <h1>🔒 Accès admin Proconvoi17</h1>
    <p>Entrez le mot de passe pour accéder au planning admin.</p>
    <input id="passwordInput" type="password" placeholder="Mot de passe admin" />
    <button onclick="verifierMotDePasse()">Se connecter</button>
    <div id="loginStatus" class="status">Statut : en attente</div>
    <p class="small">Conseil : changez le mot de passe directement dans le code.</p>
  </div>

  <div id="adminBox" class="admin-box hidden">
    <button class="logout" onclick="deconnexion()">Se déconnecter</button>
    <h2>📅 Planning Proconvoi17</h2>
    <p>Clique sur une date pour la bloquer ou la débloquer.</p>
    <div id="calendar" class="calendar"></div>
    <div id="adminStatus" class="status">Statut : chargé</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const ADMIN_PASSWORD = "Proconvoi17-Admin-2026";
    const ADMIN_SESSION_KEY = "proconvoi17_admin_ok";

    const supabaseClient = supabase.createClient(
      "https://znodbkoakkaucxikkway.supabase.co",
      "sb_publishable_Fl-F_uNkzXRUea86wbkabw_0WseZXJ1"
    );

    let datesIndispo = [];

    function formatDate(d) {
      return d.toISOString().split("T")[0];
    }

    function afficherLogin() {
      document.getElementById("loginBox").classList.remove("hidden");
      document.getElementById("adminBox").classList.add("hidden");
    }

    function afficherAdmin() {
      document.getElementById("loginBox").classList.add("hidden");
      document.getElementById("adminBox").classList.remove("hidden");
    }

    function verifierMotDePasse() {
      const val = document.getElementById("passwordInput").value;
      if (val === ADMIN_PASSWORD) {
        localStorage.setItem(ADMIN_SESSION_KEY, "ok");
        document.getElementById("loginStatus").innerText = "Statut : connexion réussie.";
        initialiserAdmin();
      } else {
        document.getElementById("loginStatus").innerText = "Statut : mot de passe incorrect.";
      }
    }

    function deconnexion() {
      localStorage.removeItem(ADMIN_SESSION_KEY);
      document.getElementById("passwordInput").value = "";
      afficherLogin();
    }

    async function loadDates() {
      const { data, error } = await supabaseClient
        .from("unavailable_dates")
        .select("date, client_name")
        .order("date", { ascending: true });

      if (error) {
        document.getElementById("adminStatus").innerText =
          "Statut : erreur chargement planning.\n" + error.message;
        return;
      }

      datesIndispo = data || [];
    }

    function afficherCalendrier() {
      const cal = document.getElementById("calendar");
      cal.innerHTML = "";

      for (let i = 0; i < 45; i++) {
        const d = new Date();
        d.setDate(d.getDate() + i);

        const iso = formatDate(d);
        const indispoObj = datesIndispo.find(item => item.date === iso);
        const isOff = !!indispoObj;

        const div = document.createElement("div");
        div.className = "day " + (isOff ? "unavailable" : "available");

        div.innerHTML = `
          <div>${d.toLocaleDateString("fr-FR")}</div>
          <div>${isOff ? "❌ Indisponible" : "✅ Disponible"}</div>
          ${
            isOff && indispoObj.client_name
              ? `<div class="client-line">Client : ${indispoObj.client_name}</div>`
              : ""
          }
        `;

        div.onclick = () => toggleDate(iso);

        cal.appendChild(div);
      }
    }

    async function toggleDate(date) {
      const existe = datesIndispo.find(item => item.date === date);

      if (existe) {
        const { error } = await supabaseClient
          .from("unavailable_dates")
          .delete()
          .eq("date", date);

        if (error) {
          document.getElementById("adminStatus").innerText =
            "Statut : erreur suppression.\n" + error.message;
          return;
        }

        document.getElementById("adminStatus").innerText =
          `Statut : date débloquée (${date}).`;
      } else {
        const { error } = await supabaseClient
          .from("unavailable_dates")
          .insert([{ date, client_name: null }]);

        if (error) {
          document.getElementById("adminStatus").innerText =
            "Statut : erreur ajout.\n" + error.message;
          return;
        }

        document.getElementById("adminStatus").innerText =
          `Statut : date bloquée (${date}).`;
      }

      await loadDates();
      afficherCalendrier();
    }

    async function initialiserAdmin() {
      afficherAdmin();
      await loadDates();
      afficherCalendrier();
    }

    function verifierSession() {
      const ok = localStorage.getItem(ADMIN_SESSION_KEY) === "ok";
      if (ok) {
        initialiserAdmin();
      } else {
        afficherLogin();
      }
    }

    verifierSession();
  </script>
</body>
</html>
